<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html tables</title>
</head>
<body>
    <table border="1">
        <caption>TIME TABLE</caption>
        <tr>
            <th>day</th>
            <th>class1</th>
            <th>class2</th>
        </tr>
        <tr>
            <td>monday</td>
            <td>maths</td>
            <td>physics</td>
        </tr>      
        <tr>
            <td>tuesday</td>
        </tr>  
    </table>
    <table border="">
        <caption>TIME TABLE</caption>
        <thead>
            <tr>
                <th>day</th>
                <th>class1</th>
                <th>class2</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>monday</td>
                <td>maths</td>
                <td>physics</td>
            </tr> 
        </tbody>
    </table>
</body>
</html>
