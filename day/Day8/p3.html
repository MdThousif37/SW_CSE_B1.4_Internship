<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>java script demo</title>
    <script>
        function change(){
            document.getElementById("demo").textContent = "Done by Me"
        }
    </script>
</head>
<body>
   <button onclick="change()">Click me</button> 
   <p id="demo">HEllo</p>
</body>
</html>
